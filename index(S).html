<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數學王子的覺醒</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
  padding:20px;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}
button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}
input{
  padding:10px;
  width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>數學王子的覺醒</h1>

<div id="home" class="card">
<h2>選擇單元</h2>

<button onclick="start('fraction')">分數之域</button>
<button onclick="start('percentage')">百分率之域</button>
<button onclick="start('speed')">速率之域</button>
<button onclick="start('algebra')">代數之域</button>
</div>

<div id="game" class="card" style="display:none;">
<h2 id="q"></h2>
<input id="answer" placeholder="輸入答案">
<button onclick="submit()">提交</button>
<button onclick="next()">下一題</button>

<p id="result"></p>
<p id="explain"></p>
</div>

<script>

let current=0
let list=[]

const questions={
fraction:[
{q:"1/2 + 1/4 = ?",a:["0.75","3/4"],e:"通分後相加"},
{q:"一塊蛋糕吃掉1/3，剩多少？",a:["2/3"],e:"1-1/3"},
],
percentage:[
{q:"100元打8折是多少？",a:["80"],e:"100×0.8"},
],
speed:[
{q:"60公里2小時，速度？",a:["30"],e:"60÷2"},
],
algebra:[
{q:"某數×2+10=50，求此數",a:["20"],e:"2x+10=50"},
{q:"金幣一半再花30剩50，原本金幣？",a:["160"],e:"設x"},
]
}

function start(type){
  list=questions[type]
  current=0
  document.getElementById("home").style.display="none"
  document.getElementById("game").style.display="block"
  show()
}

function show(){
  let q=list[current]
  document.getElementById("q").innerText=q.q
  document.getElementById("answer").value=""
  document.getElementById("result").innerText=""
  document.getElementById("explain").innerText=""
}

function submit(){
  let val=document.getElementById("answer").value.trim()
  let correct=list[current].a

  if(correct.includes(val)){
    document.getElementById("result").innerText="✅ 正確"
  }else{
    document.getElementById("result").innerText="❌ 錯誤"
    document.getElementById("explain").innerText=list[current].e
  }
}

function next(){
  current++
  if(current>=list.length){
    alert("完成本單元")
    location.reload()
  }else{
    show()
  }
}

</script>

</body>
</html>
