
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數學王子的覺醒</title>

<style>
body {
  font-family: Arial;
  background: #f5f6fa;
  padding: 20px;
}

.card {
  background: white;
  padding: 16px;
  margin: 10px 0;
  border-radius: 12px;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #6c5ce7;
  color: white;
}

.progress {
  height: 10px;
  background: #ddd;
  border-radius: 10px;
}

.bar {
  height: 10px;
  background: #6c5ce7;
  border-radius: 10px;
  width: 0%;
}
</style>

</head>

<body>

<h2>選擇覺醒領域</h2>

<div class="card">
  覺醒進度：0 / 60
</div>

<div class="card">
  學習成長（Persistence）
  <div class="progress"><div id="bar" class="bar"></div></div>
</div>

<div class="card">
  <b>分數之域</b><br><br>
  <button onclick="start()">開始</button>
</div>

<div id="game" style="display:none;">
  <h3 id="question"></h3>
  <input id="answer">
  <button onclick="submit()">送出</button>
  <p id="result"></p>
</div>

<script>

let current = 0;
let answered = 0;

const questions = [
  {q:"5/8 + 1/4 = ?", a:0.875},
  {q:"一人走1.5小時，另一人走1小時，差幾小時？", a:0.5}
];

function start(){
  document.getElementById("game").style.display="block";
  load();
}

function load(){
  document.getElementById("question").innerText = questions[current].q;
}

function normalize(input){
  input = input.replace("小時","");
  if(input.includes(" ")){
    let parts = input.split(" ");
    let whole = parseFloat(parts[0]);
    let frac = parts[1].split("/");
    return whole + frac[0]/frac[1];
  }
  if(input.includes("/")){
    let frac = input.split("/");
    return frac[0]/frac[1];
  }
  return parseFloat(input);
}

function submit(){
  let user = normalize(document.getElementById("answer").value);
  let correct = questions[current].a;

  if(Math.abs(user - correct) < 0.01){
    document.getElementById("result").innerText="正確";
    answered++;
    document.getElementById("bar").style.width = (answered/10*100)+"%";
  }else{
    document.getElementById("result").innerText="錯誤";
  }

  current++;
  if(current < questions.length){
    load();
  }
}

</script>

</body>
</html>
