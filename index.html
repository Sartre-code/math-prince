<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數學王子的覺醒</title>

<style>
body{
  font-family: Arial;
  background:#0b132b;
  color:white;
  margin:0;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.card{
  background:#1c2541;
  padding:20px;
  border-radius:16px;
  margin-bottom:16px;
}

.button{
  background:linear-gradient(90deg,#5f6af2,#7b5cff);
  padding:14px;
  border-radius:12px;
  text-align:center;
  margin-top:10px;
  cursor:pointer;
}

.bar{
  height:10px;
  background:#3a506b;
  border-radius:6px;
  margin-top:6px;
}
.bar-inner{
  height:10px;
  background:#7b5cff;
  border-radius:6px;
  width:10%;
}

#game{display:none}
input{
  width:100%;
  padding:12px;
  margin-top:10px;
}
button{
  padding:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>數學王子的覺醒</h1>

<div id="home">

<div class="card">
<h2>覺醒進度：0 / 60</h2>
</div>

<div class="card">
<h3>技能成長</h3>
Reasoning
<div class="bar"><div class="bar-inner"></div></div>
Accuracy
<div class="bar"><div class="bar-inner"></div></div>
Persistence
<div class="bar"><div class="bar-inner"></div></div>
</div>

<div class="card">
<h3>分數之域</h3>
<div class="button" onclick="start('fraction')">開始</div>
</div>

<div class="card">
<h3>百分率之域</h3>
<div class="button" onclick="start('percentage')">開始</div>
</div>

<div class="card">
<h3>速率之域</h3>
<div class="button" onclick="start('speed')">開始</div>
</div>

<div class="card">
<h3>代數之域</h3>
<div class="button" onclick="start('algebra')">開始</div>
</div>

<div class="card">
<div class="button" onclick="reviewWrong()">錯題複習</div>
</div>

</div>

<div id="game" class="card">
<h2 id="q"></h2>

<input id="answer" placeholder="輸入答案">

<button onclick="submit()">提交</button>
<button onclick="next()">下一題</button>

<p id="result"></p>
<p id="explain"></p>
</div>

<script>

let current=0
let list=[]
let wrong=[]

const qbank={
fraction:[
{q:"媽媽做蛋糕切成8份，吃3/8與1/4，共吃多少?",a:["5/8","0.625"],e:"通分"},
],
percentage:[
{q:"原價200打8折多少?",a:["160"],e:"×0.8"},
],
speed:[
{q:"距離120km用2小時，速率?",a:["60"],e:"除"},
],
algebra:[
{q:"金幣花一半再花30剩50，原本金幣?",a:["160"],e:"設x"},
]
}

function start(type){
list=qbank[type]
current=0
home.style.display="none"
game.style.display="block"
show()
}

function show(){
q.innerText=list[current].q
answer.value=""
result.innerText=""
explain.innerText=""
}

function normalize(v){
return v.replace(/\s/g,'').toLowerCase()
}

function submit(){
let val=normalize(answer.value)
let correct=list[current].a.map(normalize)

if(correct.includes(val)){
result.innerText="✅ 正確"
}else{
result.innerText="❌ 錯誤"
explain.innerText=list[current].e
wrong.push(list[current])
}
}

function next(){
current++
if(current>=list.length){
alert("完成")
location.reload()
}else show()
}

function reviewWrong(){
if(wrong.length==0){
alert("目前沒有錯題")
return
}
list=wrong
current=0
home.style.display="none"
game.style.display="block"
show()
}

</script>

</body>
</html>
